<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

            font-family:Arial,sans-serif;

            overflow:hidden;

            position:relative;

            cursor:none;
        }

        /* Floating Circles */

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation:float 12s linear infinite;
        }

        @keyframes float{

            from{
                transform:translateY(100vh);
            }

            to{
                transform:translateY(-120vh);
            }
        }

        /* Login Container */

        .container{

            width:400px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            padding:35px;

            border-radius:20px;

            box-shadow:0px 0px 25px rgba(0,0,0,0.4);

            color:white;

            z-index:2;

            animation:fadeIn 1.5s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:scale(0.8);
            }

            to{
                opacity:1;
                transform:scale(1);
            }
        }

        h2{

            text-align:center;

            margin-bottom:25px;

            font-size:40px;

            color:#00bfff;
        }

        /* Error Message */

        .error-message{

            background:rgba(255,0,0,0.15);

            padding:12px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            color:#ff6b6b;
        }

        label{

            font-size:18px;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:8px;

            margin-bottom:20px;

            border:none;

            border-radius:8px;

            outline:none;

            font-size:16px;
        }

        .buttons{

            display:flex;

            gap:15px;

            margin-top:10px;
        }

        .btn{

            flex:1;

            padding:14px;

            border:none;

            border-radius:10px;

            font-size:18px;

            text-align:center;

            text-decoration:none;

            cursor:pointer;

            transition:0.4s;

            color:white;
        }

        .login-btn{

            background:#00bfff;
        }

        .signup-btn{

            background:#334155;
        }

        .btn:hover{

            transform:scale(1.05);

            box-shadow:0px 0px 20px rgba(0,191,255,0.5);
        }

        p{

            text-align:center;

            margin-top:20px;
        }

        a{

            color:#00bfff;

            text-decoration:none;
        }

        a:hover{

            text-decoration:underline;
        }

        /* Cursor Animation */

        .cursor{

            width:20px;

            height:20px;

            border:2px solid cyan;

            border-radius:50%;

            position:absolute;

            pointer-events:none;

            transform:translate(-50%, -50%);

            z-index:999;
        }

    </style>

</head>

<body>

    <!-- Cursor -->

    <div class="cursor"></div>

    <!-- Floating Background -->

    <div class="circle"
         style="width:40px;height:40px;left:10%;animation-duration:8s;">
    </div>

    <div class="circle"
         style="width:60px;height:60px;left:30%;animation-duration:12s;">
    </div>

    <div class="circle"
         style="width:25px;height:25px;left:50%;animation-duration:9s;">
    </div>

    <div class="circle"
         style="width:50px;height:50px;left:70%;animation-duration:15s;">
    </div>

    <div class="circle"
         style="width:35px;height:35px;left:90%;animation-duration:11s;">
    </div>

    <!-- Login Form -->

    <div class="container">

        <h2>Login</h2>

        <!-- Error Message -->

        {% if error %}

        <div class="error-message">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label>Username</label>

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <label>Password</label>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <!-- Buttons -->

            <div class="buttons">

                <button type="submit"
                        class="btn login-btn">

                    Login

                </button>

                <a href="/signup/"
                   class="btn signup-btn">

                    Signup

                </a>

            </div>

        </form>

    </div>

    <!-- Cursor Script -->

    <script>

        const cursor = document.querySelector(".cursor");

        document.addEventListener("mousemove", (e)=>{

            cursor.style.left = e.pageX + "px";

            cursor.style.top = e.pageY + "px";

        });

    </script>

</body>

</html>
