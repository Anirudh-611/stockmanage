<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>InventoryPro</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'css/theme.css' %}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #0f172a
            );

            font-family: Arial, sans-serif;

            min-height:100vh;

            color:white;
        }

        /* NAVBAR */

        .navbar{

            width:100%;

            display:flex;

            justify-content:space-between;

            align-items:center;

            background:#1e293b;

            padding:20px 35px;

            border-radius:15px;

            margin-bottom:35px;

            box-shadow:0px 0px 15px rgba(0,0,0,0.3);
        }

        .navbar-left{

            display:flex;

            align-items:center;

            gap:40px;
        }

        .navbar-left h1{

            font-size:32px;

            color:#00bfff;
        }

        .nav-links{

            display:flex;

            gap:22px;
        }

        .nav-links a{

            text-decoration:none;

            color:white;

            font-size:17px;

            transition:0.3s;

            padding:8px 12px;

            border-radius:8px;
        }

        .nav-links a:hover{

            background:#00bfff;
        }

        .navbar-right{

            display:flex;

            align-items:center;

            gap:15px;
        }

        .login-btn,
        .signup-btn,
        .logout-btn{

            text-decoration:none;

            color:white;

            padding:10px 18px;

            border-radius:8px;

            font-weight:bold;
        }

        .login-btn{
            background:#2563eb;
        }

        .signup-btn{
            background:#16a34a;
        }

        .logout-btn{
            background:red;
        }

        .profile-box{

            display:flex;

            align-items:center;

            gap:10px;

            background:rgba(255,255,255,0.08);

            padding:10px 15px;

            border-radius:12px;
        }

        .profile-box img{

            width:45px;

            height:45px;

            border-radius:50%;
        }

        .content{

            padding:20px;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="navbar-left">

            <h1>InventoryPro</h1>

            <div class="nav-links">

                <a href="/dashboard/">Dashboard</a>

                <a href="/products/">Products</a>

                {% if user.is_authenticated %}

                <a href="/sales/">Sales</a>

                <a href="/inventory/">Inventory</a>

                <a href="/report/">Reports</a>

                {% endif %}

            </div>

        </div>

        <div class="navbar-right">

            {% if user.is_authenticated %}

                <div class="profile-box">

                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

                    <span>

                        {{ user.username }}

                    </span>

                </div>

                <a href="/logout/"
                   class="logout-btn">

                    Logout

                </a>

            {% else %}

                <a href="/login/"
                   class="login-btn">

                    Login

                </a>

                <a href="/signup/"
                   class="signup-btn">

                    Signup

                </a>

            {% endif %}

        </div>

    </div>

    <!-- PAGE CONTENT -->

    <div class="content">

        {% block content %}

        {% endblock %}

    </div>

    {% include 'popups.html' %}

</body>

</html>
