<style>
    .toast-stack {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 9999;
        display: grid;
        gap: 12px;
        width: min(360px, calc(100vw - 32px));
        pointer-events: none;
    }

    .app-toast {
        display: grid;
        grid-template-columns: 26px 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 15px 16px;
        border-radius: 14px;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.94);
        border: 1px solid rgba(148, 163, 184, 0.24);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        pointer-events: auto;
        animation: toastIn 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .app-toast.success {
        border-color: rgba(52, 211, 153, 0.45);
    }

    .app-toast.error,
    .app-toast.warning {
        border-color: rgba(251, 113, 133, 0.5);
    }

    .toast-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: linear-gradient(135deg, #60a5fa, #2dd4bf);
        box-shadow: 0 0 0 5px rgba(45, 212, 191, 0.12);
    }

    .app-toast.success .toast-icon {
        background: linear-gradient(135deg, #22c55e, #34d399);
    }

    .app-toast.error .toast-icon,
    .app-toast.warning .toast-icon {
        background: linear-gradient(135deg, #f43f5e, #fb7185);
    }

    .toast-text {
        font: 600 14px/1.35 'Inter', 'Segoe UI', sans-serif;
        color: #e5edf8;
    }

    .toast-close {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 50%;
        color: #cbd5e1;
        background: rgba(148, 163, 184, 0.14);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
    }

    .toast-close:hover {
        color: white;
        background: rgba(148, 163, 184, 0.26);
    }

    .app-toast.is-leaving {
        animation: toastOut 0.24s ease-in forwards;
    }

    .confirm-overlay {
        position: fixed;
        inset: 0;
        z-index: 9998;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(2, 6, 23, 0.68);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .confirm-overlay.is-open {
        display: grid;
        animation: confirmFade 0.2s ease-out both;
    }

    .confirm-dialog {
        width: min(430px, 100%);
        padding: 26px;
        border-radius: 18px;
        color: #f8fafc;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)), rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(251, 113, 133, 0.36);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
        animation: confirmPop 0.28s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .confirm-dialog h3 {
        margin: 0 0 10px;
        color: #f8fafc;
        font: 800 24px/1.2 'Inter', 'Segoe UI', sans-serif;
    }

    .confirm-dialog p {
        margin: 0 0 22px;
        color: #cbd5e1;
        font: 500 15px/1.5 'Inter', 'Segoe UI', sans-serif;
    }

    .confirm-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }

    .confirm-actions .btn {
        min-width: 110px;
    }

    @keyframes toastIn {
        from {
            opacity: 0;
            transform: translateX(24px) scale(0.98);
        }
        to {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
    }

    @keyframes toastOut {
        to {
            opacity: 0;
            transform: translateX(24px) scale(0.98);
        }
    }

    @keyframes confirmFade {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes confirmPop {
        from {
            opacity: 0;
            transform: translateY(18px) scale(0.96);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    @media (max-width: 560px) {
        .toast-stack {
            top: 12px;
            right: 12px;
            left: 12px;
            width: auto;
        }

        .confirm-actions {
            flex-direction: column;
        }
    }
</style>

<div class="toast-stack" aria-live="polite" aria-atomic="true">
    {% if messages %}
        {% for message in messages %}
            <div class="app-toast {{ message.tags|default:'info' }}">
                <span class="toast-icon"></span>
                <span class="toast-text">{{ message }}</span>
                <button type="button" class="toast-close" aria-label="Close notification">x</button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<div class="confirm-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h3 id="confirmTitle">Confirm Action</h3>
        <p id="confirmMessage">Are you sure you want to continue?</p>
        <div class="confirm-actions">
            <button type="button" class="btn back-btn" id="confirmCancel">Cancel</button>
            <button type="button" class="btn delete" id="confirmOk">Confirm</button>
        </div>
    </div>
</div>

<script>
    (function () {
        const toasts = document.querySelectorAll('.app-toast');

        toasts.forEach((toast, index) => {
            toast.style.animationDelay = `${index * 90}ms`;

            const close = toast.querySelector('.toast-close');
            const dismiss = () => {
                toast.classList.add('is-leaving');
                setTimeout(() => toast.remove(), 260);
            };

            close.addEventListener('click', dismiss);
            setTimeout(dismiss, 4200 + index * 500);
        });

        const overlay = document.getElementById('confirmOverlay');
        const message = document.getElementById('confirmMessage');
        const cancel = document.getElementById('confirmCancel');
        const ok = document.getElementById('confirmOk');
        let pendingForm = null;

        const closeConfirm = () => {
            overlay.classList.remove('is-open');
            overlay.setAttribute('aria-hidden', 'true');
            pendingForm = null;
        };

        document.querySelectorAll('form').forEach((form) => {
            const dangerButton = form.querySelector('.delete, .delete-btn, button[name="delete"]');
            const isDeletePage = window.location.pathname.includes('/delete/');

            if (!dangerButton && !isDeletePage) {
                return;
            }

            form.addEventListener('submit', (event) => {
                if (form.dataset.confirmed === 'true') {
                    return;
                }

                event.preventDefault();
                pendingForm = form;
                message.textContent = form.dataset.confirmMessage || 'This action cannot be undone. Do you want to continue?';
                overlay.classList.add('is-open');
                overlay.setAttribute('aria-hidden', 'false');
            });
        });

        cancel.addEventListener('click', closeConfirm);
        overlay.addEventListener('click', (event) => {
            if (event.target === overlay) {
                closeConfirm();
            }
        });

        ok.addEventListener('click', () => {
            if (!pendingForm) {
                closeConfirm();
                return;
            }

            pendingForm.dataset.confirmed = 'true';
            pendingForm.submit();
        });
    })();
</script>
