<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delete Product</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

            font-family: Arial, sans-serif;

            overflow: hidden;

            position: relative;

            color: white;
        }

        /* Floating Animation */

        .circle{

            position: absolute;

            border-radius: 50%;

            background: rgba(255,255,255,0.08);

            animation: float 12s linear infinite;
        }

        @keyframes float{

            from{
                transform: translateY(100vh);
            }

            to{
                transform: translateY(-120vh);
            }
        }

        /* Delete Box */

        .container{

            width: 420px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(10px);

            padding: 35px;

            border-radius: 20px;

            box-shadow: 0px 0px 25px rgba(0,0,0,0.4);

            text-align: center;

            animation: fadeIn 1.5s ease;

            z-index: 2;
        }

        @keyframes fadeIn{

            from{
                opacity: 0;
                transform: scale(0.8);
            }

            to{
                opacity: 1;
                transform: scale(1);
            }
        }

        h2{

            margin-bottom: 20px;

            font-size: 38px;

            color: #ff4d4d;
        }

        p{

            font-size: 20px;

            margin-bottom: 30px;
        }

        .btn{

            padding: 12px 20px;

            border: none;

            border-radius: 10px;

            color: white;

            font-size: 18px;

            cursor: pointer;

            margin: 10px;

            transition: 0.4s;
        }

        .delete{

            background: red;
        }

        .cancel{

            background: gray;
        }

        .btn:hover{

            transform: scale(1.05);

            box-shadow: 0px 0px 15px white;
        }

    </style>

</head>

<body>

    <!-- Floating Background -->

    <div class="circle" style="width:40px;height:40px;left:10%;animation-duration:8s;"></div>

    <div class="circle" style="width:60px;height:60px;left:30%;animation-duration:12s;"></div>

    <div class="circle" style="width:25px;height:25px;left:50%;animation-duration:9s;"></div>

    <div class="circle" style="width:50px;height:50px;left:70%;animation-duration:15s;"></div>

    <div class="circle" style="width:35px;height:35px;left:90%;animation-duration:11s;"></div>

    <!-- Delete Confirmation -->

    <div class="container">

        <h2>Delete Product</h2>

        <p>
            Are you sure you want to delete this product?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button type="submit" class="btn delete">
                Delete
            </button>

            <a href="/products/" class="btn cancel">
                Cancel
            </a>

        </form>

    </div>

    {% include 'popups.html' %}

</body>

</html>
