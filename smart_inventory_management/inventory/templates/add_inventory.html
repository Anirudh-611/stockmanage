<!DOCTYPE html>
<html>

<head>

    <title>Add Inventory</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

            overflow:hidden;

            position:relative;

            color:white;
        }

        /* Floating Circles */

        .circle{

            position:absolute;

            border-radius:50%;

            background: rgba(255,255,255,0.08);

            animation: float 12s linear infinite;
        }

        @keyframes float{

            from{
                transform:translateY(100vh);
            }

            to{
                transform:translateY(-120vh);
            }
        }

        /* Container */

        .container{

            width:450px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(10px);

            padding:35px;

            border-radius:20px;

            box-shadow:0px 0px 25px rgba(0,0,0,0.4);

            animation:fadeIn 1.5s ease;

            z-index:2;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:scale(0.8);
            }

            to{
                opacity:1;
                transform:scale(1);
            }
        }

        h2{

            text-align:center;

            color:#00bfff;

            margin-bottom:25px;

            font-size:38px;
        }

        label{

            font-size:18px;
        }

        input, select{

            width:100%;

            padding:12px;

            margin-top:8px;
            margin-bottom:20px;

            border:none;

            border-radius:8px;

            outline:none;

            font-size:16px;
        }

        button{

            width:100%;

            padding:14px;

            background:#00bfff;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;

            transition:0.4s;
        }

        button:hover{

            background:#009acd;

            transform:scale(1.05);

            box-shadow:0px 0px 20px #00bfff;
        }

        .back-btn{

            display:block;

            text-align:center;

            margin-top:20px;

            color:#00bfff;

            text-decoration:none;

            font-size:17px;
        }

        .back-btn:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

    <!-- Floating Background -->

    <div class="circle" style="width:40px;height:40px;left:10%;animation-duration:8s;"></div>

    <div class="circle" style="width:60px;height:60px;left:30%;animation-duration:12s;"></div>

    <div class="circle" style="width:25px;height:25px;left:50%;animation-duration:9s;"></div>

    <div class="circle" style="width:50px;height:50px;left:70%;animation-duration:15s;"></div>

    <div class="circle" style="width:35px;height:35px;left:90%;animation-duration:11s;"></div>

    <!-- Form Container -->

    <div class="container">

        <h2>Add Inventory</h2>

        <form method="POST">

            {% csrf_token %}

            <label>Product Name</label>

            <input type="text" name="product_name" placeholder="Enter Product Name" required>

            <label>Quantity</label>

            <input type="number" name="quantity" placeholder="Enter Quantity" required>

            <label>Price</label>

            <input type="number" step="0.01" name="price" placeholder="Enter Price" required>

            <label>Category</label>

            <select name="category">

                <option value="Electronics">Electronics</option>

                <option value="Accessories">Accessories</option>

                <option value="Office Equipment">Office Equipment</option>

            </select>

            <button type="submit">

                Add Inventory

            </button>

        </form>

        <a href="/inventory/" class="back-btn">

            ← Back To Inventory

        </a>

    </div>

    {% include 'popups.html' %}

</body>

</html>
