<!DOCTYPE html>
<html>

<head>

    <title>Add Sale</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

            font-family:Arial, sans-serif;

            color:white;

            padding:40px;
        }

        /* Main Container */

        .container{

            width:550px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(12px);

            padding:40px;

            border-radius:20px;

            box-shadow:0px 0px 25px rgba(0,0,0,0.4);

            animation:fadeIn 1.2s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(-20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h2{

            text-align:center;

            margin-bottom:30px;

            font-size:42px;

            color:#00bfff;
        }

        /* Form Styling */

        form{

            display:flex;

            flex-direction:column;
        }

        label{

            margin-bottom:8px;

            font-size:18px;

            font-weight:bold;
        }

        input, select{

            padding:14px;

            margin-bottom:20px;

            border:none;

            border-radius:10px;

            outline:none;

            font-size:16px;

            background: rgba(255,255,255,0.9);
        }

        input:focus,
        select:focus{

            box-shadow:0px 0px 10px #00bfff;
        }

        /* Buttons */

        .buttons{

            display:flex;

            justify-content:space-between;

            gap:15px;

            margin-top:10px;
        }

        .btn{

            width:100%;

            text-align:center;

            text-decoration:none;

            padding:14px;

            border:none;

            border-radius:10px;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        .submit-btn{

            background:#16a34a;
        }

        .back-btn{

            background:#2563eb;
        }

        .btn:hover{

            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Add Sale</h2>

        {% if error %}

        <div style="background: rgba(239, 68, 68, 0.2); border-left: 5px solid #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; color: #f87171; text-align: center;">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label>Customer Name</label>

            <input type="text" name="customer_name" placeholder="Enter Customer Name" required>

            <label>Select Product</label>

            <select name="product_id" required>

                {% for product in products %}

                    <option value="{{ product.id }}">{{ product.name }} (₹{{ product.price }} - {{ product.quantity }} in stock)</option>

                {% empty %}

                    <option value="" disabled>No products available</option>

                {% endfor %}

            </select>

            <label>Quantity</label>

            <input type="number" name="quantity" placeholder="Enter Quantity" min="1" required>

            <label>Payment Method</label>

            <select name="payment_method">

                <option>Cash</option>

                <option>UPI</option>

                <option>Credit Card</option>

                <option>Debit Card</option>

                <option>Net Banking</option>

            </select>

            <label>Payment Status</label>

            <select name="payment_status">

                <option>Paid</option>

                <option>Pending</option>

                <option>Cancelled</option>

            </select>

            <label>Order Date</label>

            <input type="date" name="order_date" required>

            <!-- Buttons -->

            <div class="buttons">

                <button type="submit" class="btn submit-btn">

                    Add Sale

                </button>

                <a href="/sales/list/" class="btn back-btn">

                    Back

                </a>

            </div>

        </form>

    </div>

    {% include 'popups.html' %}

</body>

</html>
